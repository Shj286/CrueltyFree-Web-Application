<!DOCTYPE html>
<html>
<head>
    <title>CrueltyFree Product Analyzer</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div class="container">
        <h1>CrueltyFree Product Analyzer</h1>
        <div class="input-section">
            <input type="file" id="productImage" accept="image/*">
            <button onclick="analyzeProduct()">Analyze Product</button>
        </div>
        <div id="loading" style="display: none;">
            Analyzing product ingredients...
        </div>
        <div id="results"></div>
    </div>

    <script>
        const BACKEND_URL = 'http://localhost:5001';

        async function analyzeProduct() {
            const fileInput = document.getElementById('productImage');
            const resultDiv = document.getElementById('results');
            const loadingDiv = document.getElementById('loading');

            if (!fileInput.files[0]) {
                alert('Please select an image first');
                return;
            }

            try {
                loadingDiv.style.display = 'block';
                resultDiv.innerHTML = '';

                const formData = new FormData();
                formData.append('image', fileInput.files[0]);

                const response = await fetch(`${BACKEND_URL}/analyze-ingredients`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                displayResults(data);
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `<p class="error">Error: ${error.message}</p>`;
            } finally {
                loadingDiv.style.display = 'none';
            }
        }

        function displayResults(data) {
            const resultDiv = document.getElementById('results');
            
            if (data.error) {
                resultDiv.innerHTML = `<p class="error">${data.error}</p>`;
                return;
            }

            let html = `
                <div class="results-container">
                    <h2>Analysis Results</h2>
                    
                    <h3 class="section-title">Extracted Text</h3>
                    <div class="ocr-section">
                        <h4>Identified Ingredients:</h4>
                        <div class="ingredients-list">
                            ${data.ingredients_found.map(ingredient => {
                                const isHarmful = data.analysis_results.harmful_details.some(
                                    h => h.ingredient.toLowerCase() === ingredient.toLowerCase()
                                );
                                return `<span class="ingredient-item ${isHarmful ? 'harmful' : 'safe'}">${ingredient}</span>`;
                            }).join('')}
                        </div>
                    </div>

                    <div class="safety-score ${data.analysis_results.safety_level.level.toLowerCase().replace(' ', '-')}">
                        <h3>Safety Score: ${data.analysis_results.safety_score}</h3>
                        <p>${data.analysis_results.safety_level.level}: ${data.analysis_results.safety_level.description}</p>
                    </div>

                    <div class="ingredients-summary">
                        <p>Total Ingredients: ${data.analysis_results.total_ingredients}</p>
                        <p>Harmful Ingredients Found: ${data.analysis_results.harmful_ingredients_found}</p>
                    </div>`;

            if (data.analysis_results.harmful_details.length > 0) {
                html += `
                    <div class="harmful-ingredients">
                        <h3>Harmful Ingredients Found:</h3>
                        <ul>`;
                
                data.analysis_results.harmful_details.forEach(ingredient => {
                    html += `
                        <li class="harmful">
                            <strong>${ingredient.ingredient}</strong> (Hazard Score: ${ingredient.score})
                            <p>Concerns: ${ingredient.concerns.join(', ')}</p>
                            <p>Found in: ${ingredient.found_in.join(', ')}</p>
                        </li>`;
                });
                
                html += `</ul></div>`;
            }

            html += `</div>`;
            resultDiv.innerHTML = html;
        }

        // Check connection when page loads
        window.addEventListener('load', async () => {
            try {
                const response = await fetch(`${BACKEND_URL}/health`);
                if (response.ok) {
                    console.log('Connected to backend successfully');
                }
            } catch (error) {
                console.error('Failed to connect to backend:', error);
                document.getElementById('results').innerHTML = `
                    <p class="error">Failed to connect to backend server. Please make sure the server is running on port 5000.</p>
                `;
            }
        });
    </script>
</body>
</html>
