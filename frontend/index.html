<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrueltyFree Product Analyzer</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>CrueltyFree Product Analyzer</h1>
            <p>Upload a photo of product ingredients to analyze for harmful substances</p>
        </header>

        <main>
            <div class="upload-section">
                <input type="file" id="imageInput" accept="image/*" class="file-input">
                <label for="imageInput" class="file-label">
                    Choose Image or Take Photo
                </label>
            </div>

            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Analyzing ingredients...</p>
            </div>

            <div id="result" class="result-section"></div>
        </main>

        <footer>
            <p>Powered by ML-based ingredient analysis</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
